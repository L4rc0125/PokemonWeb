.item-row{
  display:flex;

<script>
const DEFAULT_ATTACKER = {{ default_attacker|tojson }};
const DEFAULT_DEFENDER = {{ default_defender|tojson }};
const el = (id)=>document.getElementById(id);

let pokemonList = [];
const formState = { attacker: null, defender: null };
const sideBaseStats = { attacker: null, defender: null };
const calcState = {
  attackerItem: "",
  defenderItemB: "",
  defenderItemD: "",
  attackerRank: 0,
  defenderRankB: 0,
  defenderRankD: 0
};
const detailCache = new Map();
const moveInfoCache = new Map();
const sideAbilityDescriptions = { attacker: {}, defender: {} };
const formRenderTokens = { attacker: 0, defender: 0 };

const FORCED_FORM_MAP = {
  "ウーラオス": ["ウーラオス(いちげきのかた)", "ウーラオス(れんげきのかた)"],
  "ザシアン": ["ザシアン(けんのおう)"],
  "ザマゼンタ": ["ザマゼンタ(たてのおう)"],
  "バドレックス": ["バドレックス(こくばじょう)", "バドレックス(はくばじょう)"]
};

const FORCED_MEGA_MAP = {
  "フシギバナ": ["メガフシギバナ"],
  "リザードン": ["メガリザードンX", "メガリザードンY"],
  "カメックス": ["メガカメックス"],
  "スピアー": ["メガスピアー"],
  "ピジョット": ["メガピジョット"],
  "フーディン": ["メガフーディン"],
  "ヤドラン": ["メガヤドラン"],
  "ゲンガー": ["メガゲンガー"],
  "カイロス": ["メガカイロス"],
  "ギャラドス": ["メガギャラドス"],
  "プテラ": ["メガプテラ"],
  "ミュウツー": ["メガミュウツーX", "メガミュウツーY"],
  "デンリュウ": ["メガデンリュウ"],
  "ハガネール": ["メガハガネール"],
  "ハッサム": ["メガハッサム"],
  "ヘラクロス": ["メガヘラクロス"],
  "ヘルガー": ["メガヘルガー"],
  "バンギラス": ["メガバンギラス"],
  "ジュカイン": ["メガジュカイン"],
  "バシャーモ": ["メガバシャーモ"],
  "ラグラージ": ["メガラグラージ"],
  "サーナイト": ["メガサーナイト"],
  "ヤミラミ": ["メガヤミラミ"],
  "クチート": ["メガクチート"],
  "ボスゴドラ": ["メガボスゴドラ"],
  "チャーレム": ["メガチャーレム"],
  "ライボルト": ["メガライボルト"],
  "サメハダー": ["メガサメハダー"],
  "バクーダ": ["メガバクーダ"],
  "チルタリス": ["メガチルタリス"],
  "ジュペッタ": ["メガジュペッタ"],
  "アブソル": ["メガアブソル"],
  "オニゴーリ": ["メガオニゴーリ"],
  "ボーマンダ": ["メガボーマンダ"],
  "メタグロス": ["メガメタグロス"],
  "ラティアス": ["メガラティアス"],
  "ラティオス": ["メガラティオス"],
  "レックウザ": ["メガレックウザ"],
  "ミミロップ": ["メガミミロップ"],
  "ガブリアス": ["メガガブリアス"],
  "ルカリオ": ["メガルカリオ"],
  "ユキノオー": ["メガユキノオー"],
  "タブンネ": ["メガタブンネ"],
  "エルレイド": ["メガエルレイド"],
  "ディアンシー": ["メガディアンシー"]
};

function kataToHira(text){
  return String(text || "").replace(/[ァ-ヶ]/g, s =>
    String.fromCharCode(s.charCodeAt(0) - 0x60)
  );
}

function toAscii(text){
  return String(text || "")
    .replace(/[Ａ-Ｚａ-ｚ０-９]/g, s => String.fromCharCode(s.charCodeAt(0) - 0xFEE0))
    .replace(/×/g, "x");
}

function normalizeName(text){
  return kataToHira(toAscii(String(text || "")))
    .toLowerCase()
    .replace(/[\s　._\-・/]/g, "")
    .replace(/[()（）[\]【】]/g, "")
    .replace(/のすがた/g, "")
    .replace(/すがた/g, "")
    .replace(/ひすいちほう/g, "ひすい")
    .replace(/あるふぁ/gi, "アルファ")
    .replace(/mega/gi, "メガ")
    .replace(/primal/gi, "ゲンシ")
    .replace(/alola/gi, "アローラ")
    .replace(/galar/gi, "ガラル")
    .replace(/hisui/gi, "ヒスイ")
    .replace(/paldea/gi, "パルデア")
    .replace(/form/gi, "")
    .replace(/ type/gi, "")
    .replace(/x/gi, "x")
    .replace(/y/gi, "y");
}

function normalizeFormLabel(text){
  return normalizeName(text)
    .replace(/めが/g, "mega")
    .replace(/げんし/g, "primal")
    .replace(/あろーら/g, "alola")
    .replace(/がらる/g, "galar")
    .replace(/ひすい/g, "hisui")
    .replace(/ぱるであ/g, "paldea");
}

function getDisplayName(p){
  return p && (p.jp_name || p.name || p.display_name || "");
}

function getPokemonNames(){
  return pokemonList.map(p => getDisplayName(p)).filter(Boolean);
}

function getPokemonSearchEntries(){
  const entries = [];
  const seen = new Set();

  pokemonList.forEach(p => {
    const display = getDisplayName(p);
    if (!display) return;

    const aliases = [display, p.api_name, p.species_name, p.name, p.display_name].filter(Boolean);
    const key = normalizeName(display);
    if (!key || seen.has(key)) return;
    seen.add(key);
    entries.push({display, aliases});
  });

  uniq(Object.keys(FORCED_MEGA_MAP).concat(getForcedFormNames())).forEach(name => {
    const display = String(name || "").trim();
    const key = normalizeName(display);
    if (!display || !key || seen.has(key)) return;
    seen.add(key);
    entries.push({display, aliases: [display]});
  });

  return entries;
}

function uniq(arr){
  return [...new Set(arr.filter(Boolean))];
}

function getForcedFormNames(base){
  if (base) return [...(FORCED_FORM_MAP[base] || [])];
  return Object.values(FORCED_FORM_MAP || {}).flat();
}

function getForcedMegaNames(base){
  if (base) return [...(FORCED_MEGA_MAP[base] || [])];
  return Object.values(FORCED_MEGA_MAP || {}).flat();
}

function hasPokemonName(name){
  const target = normalizeName(name);
  return getPokemonSearchEntries().some(entry => (entry.aliases || []).some(v => normalizeName(v) === target));
}

function isRealMegaName(name){
  const raw = String(name || "").trim();
  const base = raw.replace(/^メガ/, "").replace(/[XxＸｘYyＹｙ]$/, "").trim();
  const forced = getForcedMegaNames(base);
  return forced.some(v => normalizeName(v) === normalizeName(raw));
}

function getBaseName(name){
  let s = String(name || "").trim();
  if (/^メガ/.test(s) && isRealMegaName(s)) {
    s = s.replace(/^メガ/, "");
  }
  if (/^ゲンシ/.test(s)) {
    s = s.replace(/^ゲンシ/, "");
  }
  s = s.replace(/[（(][^）)]*[）)]/g, "");
  s = s.replace(/(アローラ|ガラル|ヒスイ|パルデア)$/g, "");
  s = s.replace(/[XxＸｘYyＹｙ]$/g, "");
  return s.trim();
}

function getFormLabel(name){
  const s = String(name || "").trim();

  if (/^メガ/.test(s) && isRealMegaName(s)) {
    if (/[XxＸｘ]$/.test(s)) return "メガX";
    if (/[YyＹｙ]$/.test(s)) return "メガY";
    return "メガ";
  }
  if (/^ゲンシ/.test(s)) return "ゲンシ";

  const regionEnd = s.match(/(アローラ|ガラル|ヒスイ|パルデア)$/);
  if (regionEnd) return regionEnd[1];

  const regionInside = s.match(/(アローラ|ガラル|ヒスイ|パルデア)/);
  if (regionInside) return regionInside[1];

  const paren = s.match(/[（(]([^）)]+)[）)]/);
  if (paren) return paren[1];

  return "通常";
}

function getCandidateNames(name){
  const raw = String(name || "").trim();
  if (!raw) return [];

  const base = getBaseName(raw);
  const list = [raw];

  // メガ・ゲンシ系のゆれ
  if (/^メガ/.test(raw)) {
    const suffixX = /[XxＸｘ]$/.test(raw);
    const suffixY = /[YyＹｙ]$/.test(raw);
    if (suffixX) {
      list.push(`メガ${base}X`, `メガ${base}Ｘ`, `${base}メガX`, `${base}（メガX）`, `${base}(メガX)`);
    } else if (suffixY) {
      list.push(`メガ${base}Y`, `メガ${base}Ｙ`, `${base}メガY`, `${base}（メガY）`, `${base}(メガY)`);
    } else {
      list.push(`メガ${base}`, `${base}メガ`, `${base}（メガ）`, `${base}(メガ)`);
    }
  }

  if (/^ゲンシ/.test(raw)) {
    list.push(`ゲンシ${base}`, `${base}（ゲンシ）`, `${base}(ゲンシ)`);
  }

  // リージョン/姿違い
  const label = getFormLabel(raw);
  if (["アローラ", "ガラル", "ヒスイ", "パルデア"].includes(label)) {
    list.push(`${base}${label}`, `${base}（${label}）`, `${base}(${label})`);
  } else if (label !== "通常" && label !== "メガ" && label !== "メガX" && label !== "メガY" && label !== "ゲンシ") {
    list.push(`${base}（${label}）`, `${base}(${label})`, `${base}${label}`);
  }

  list.push(base);
  return uniq(list);
}

async function fetchDetailByName(name){
  const key = String(name || "").trim();
  if (!key) return null;

  try {
    const res = await fetch(`/api/pokemon-detail?name=${encodeURIComponent(key)}&t=${Date.now()}`, {cache: "no-store"});
    const data = await res.json();
    if (res.ok && data) {
      detailCache.set(key, data);
      return data;
    }
  } catch (e) {}

  return null;
}

async function resolvePokemonDetail(name){
  const direct = await fetchDetailByName(name);
  if (direct) {
    return { resolvedName: name, data: direct };
  }

  const candidates = getCandidateNames(name);
  for (const candidate of candidates) {
    const data = await fetchDetailByName(candidate);
    if (data) {
      return { resolvedName: candidate, data };
    }
  }
  return null;
}

async function waitList(){
  while(true){
    const res = await fetch("/api/pokemon-list");
    const data = await res.json();
    if(data.ready && data.pokemon && data.pokemon.length > 0) return data.pokemon;
    el("status").textContent = "ポケモン一覧取得中…";
    await new Promise(r => setTimeout(r, 1000));
  }
}

function calcWeakness(types){
  const result = {};
  const allTypes = Object.keys(TYPE_CHART);
  allTypes.forEach(att=>{
    let mult = 1;
    types.forEach(def=>{
      const chart = TYPE_CHART[def]||{};
      mult *= chart[att] ?? 1;
    });
    if(mult!==1) result[att]=mult;
  });
  return result;
}

function getTypeEffectiveness(moveType, defenderTypes){
  const attackType = String(moveType || "").trim();
  const types = Array.isArray(defenderTypes) ? defenderTypes : [];
  if (!attackType || !types.length) return 1;

  let mult = 1;
  types.forEach(defType => {
    const chart = TYPE_CHART[String(defType || "").trim()] || {};
    const value = chart[attackType];
    mult *= (value ?? 1);
  });
  return mult;
}

  const types = Array.isArray(attackerTypes) ? attackerTypes : [];
  if (!attackType || !types.length) return 1;
  return types.includes(attackType) ? 1.5 : 1;
}

function getHpConditionalTakenAbilityMultiplier(defenderAbility, moveType, effectiveness, defenderHp, ignoresDefenderAbility){
  if (ignoresDefenderAbility) return 1;

  const ability = String(defenderAbility || "").trim();
  const hp = Number(defenderHp || 0);
  const currentHp = Number(getDisplayedStatValue("defender", "hp") || 0);

  if (hp <= 0 || currentHp <= 0) return 1;

  const isFullHp = currentHp >= hp;

  if (ability === "ふしぎなまもり" && effectiveness <= 1) {
    return 0;
  }

  if (isFullHp && (ability === "マルチスケイル" || ability === "ファントムガード")) {
    return 0.5;
  }

  if (effectiveness > 1) {
    if (ability === "フィルター" || ability === "ハードロック" || ability === "プリズムアーマー") {
      return 0.75;
    }
  }

  if (ability === "もふもふ") {
    if (moveType === "ほのお") return 2.0;
    return 0.5;
  }

  return 1;
}
function getTeraStabMultiplier(moveType, baseTypes, teraType, attackerAbility){
  const attackType = String(moveType || "").trim();
  const originalTypes = Array.isArray(baseTypes) ? baseTypes : [];
  const tera = String(teraType || "").trim();
  const isOriginalStab = !!attackType && originalTypes.includes(attackType);
  const isTeraMatch = !!attackType && !!tera && attackType === tera;
  const isAdaptability = String(attackerAbility || "").trim() === "てきおうりょく";

  if (!tera){
    if (!isOriginalStab) return 1;
    return isAdaptability ? 2.0 : 1.5;

    return isAdaptability ? 2.25 : 2.0;
  }
  if (isTeraMatch){

  }

  }
  return 1;
}

function getSelectedCalcValues(category, effectiveness){
  const atkRank = Number((el("atk_rank") || {}).value || 0);
  const defRankB = Number((el("def_rank_b") || {}).value || 0);
  const defRankD = Number((el("def_rank_d") || {}).value || 0);
  const atkItem = String((el("atk_item") || {}).value || "");
  const defenderItem = String((el("def_item_d") || {}).value || "");

  let attackItemMult = 1;
  let powerItemMult = 1;
  let finalDamageItemMult = 1;
  let defenseItemMult = 1;

  if (category === "physical"){
    if (atkItem === "choice_band") attackItemMult = 1.5;
    if (atkItem === "muscle_band") powerItemMult = 4505 / 4096;
  } else if (category === "special"){
    if (atkItem === "choice_specs") attackItemMult = 1.5;
    if (atkItem === "wise_glasses") powerItemMult = 4505 / 4096;
  }
  if (atkItem === "type_power_boost") powerItemMult *= 4915 / 4096;
  if (atkItem === "life_orb") finalDamageItemMult *= 5324 / 4096;
  if (atkItem === "expert_belt" && effectiveness > 1) finalDamageItemMult *= 4915 / 4096;
  if (defenderItem === "resist_berry" && effectiveness > 1) finalDamageItemMult *= 0.5;

  if (category === "physical"){
    if (defenderItem === "eviolite") defenseItemMult *= 1.5;
    if (defenderItem === "metal_powder") defenseItemMult *= 2.0;
  } else {
    if (defenderItem === "assault_vest") defenseItemMult *= 1.5;
    if (defenderItem === "eviolite") defenseItemMult *= 1.5;
  }

  return {
    atkRank,
    defRank: category === "special" ? defRankD : defRankB,
    attackItemMult,
    powerItemMult,
    finalDamageItemMult,
    defenseItemMult
  };
}

function getAbilityAttackMultiplier(abilityName, move, category){
  const ability = String(abilityName || "").trim();
  const moveType = getMoveType(move);
  const moveName = String((move && move.name) || "").trim();
  const entry = ATTACK_ABILITY_MODIFIERS[ability];
  if (!entry) return 1;

  if (ability === "てきおうりょく" && entry.adaptability) return 1;
  if (moveType === "でんき" && entry.electric) return entry.electric;
  if (moveType === "ドラゴン" && entry.dragon) return entry.dragon;
  if (moveType === "じめん" && entry.ground) return entry.ground;
  if (moveType === "いわ" && entry.rock) return entry.rock;
  if (moveType === "はがね" && entry.steel) return entry.steel;
  if (moveType === "ほのお" && entry.fire) return entry.fire;
  if (moveType === "どく" && entry.poison) return entry.poison;
  if (moveType === "むし" && entry.bug) return entry.bug;
  if (moveType === "みず" && entry.water) return entry.water;
  if (moveType === "くさ" && entry.grass) return entry.grass;
  if (moveType === "フェアリー" && entry.fairy) return entry.fairy;
  if (moveType === "あく" && entry.dark) return entry.dark;

  if (entry.punch && PUNCH_MOVES.has(moveName)) return entry.punch;
  if (entry.slice && SLICE_MOVES.has(moveName)) return entry.slice;
  if (entry.bite && BITE_MOVES.has(moveName)) return entry.bite;
  if (entry.pulse && PULSE_MOVES.has(moveName)) return entry.pulse;
  if (entry.sound && SOUND_MOVES.has(moveName)) return entry.sound;
  if (entry.recoil && RECOIL_MOVES.has(moveName)) return entry.recoil;
  if (entry.technician && Number(getMovePower(move)) > 0 && Number(getMovePower(move)) <= 60) return entry.technician;
  if (entry.sheer_force) return entry.sheer_force;
  if (entry.rivalry) return entry.rivalry;

  if (category === "physical" && entry.attack) return entry.attack;
  if (category === "special" && entry.special_attack) return entry.special_attack;
  return 1;
}

function getAbilityDefenseStatMultiplier(abilityName, category){
  const ability = String(abilityName || "").trim();
  const entry = DEFENSE_ABILITY_MODIFIERS[ability];
  if (!entry) return 1;
  if (category === "physical" && entry.defense) return entry.defense;
  if (category === "special" && entry.special_defense) return entry.special_defense;
  return 1;
}

function getAbilityTakenMultiplier(abilityName, move, category){
  const ability = String(abilityName || "").trim();
  const moveType = getMoveType(move);
  const moveName = String((move && move.name) || "").trim();
  const entry = DEFENSE_ABILITY_MODIFIERS[ability];
  if (!entry) return 1;

  if (moveType === "ほのお" && entry.fire_taken !== undefined) return entry.fire_taken;
  if (moveType === "こおり" && entry.ice_taken !== undefined) return entry.ice_taken;
  if (moveType === "じめん" && entry.ground_taken !== undefined) return entry.ground_taken;
  if (moveType === "でんき" && entry.electric_taken !== undefined) return entry.electric_taken;
  if (moveType === "みず" && entry.water_taken !== undefined) return entry.water_taken;
  if (moveType === "くさ" && entry.grass_taken !== undefined) return entry.grass_taken;
  if (SOUND_MOVES.has(moveName) && entry.sound_taken !== undefined) return entry.sound_taken;
  if (category === "special" && entry.special_attack_taken !== undefined) return entry.special_attack_taken;
  return 1;
}

function sliderIndexToEv(index){
  const n = Number(index || 0);
  if (n <= 0) return 0;
  if (n === 1) return 4;
  return Math.min(252, 4 + (n - 1) * 8);
}

function actualToBaseStat(actual, isHp){
  const value = Number(actual || 0);
  return Math.max(1, value - (isHp ? 75 : 20));
}

function deriveBaseStatsFromActual(stats){
  return {
    hp: actualToBaseStat((stats || {}).hp, true),
    attack: actualToBaseStat((stats || {}).attack, false),
    defense: actualToBaseStat((stats || {}).defense, false),
    special_attack: actualToBaseStat((stats || {}).special_attack, false),
    special_defense: actualToBaseStat((stats || {}).special_defense, false),
    speed: actualToBaseStat((stats || {}).speed, false),
  };
}

function calcActualStatFromBase(base, ev, isHp){
  const b = Number(base || 0);
  const e = Number(ev || 0);
  if (isHp){
    return Math.floor(((b * 2 + 31 + Math.floor(e / 4)) * 50) / 100) + 60;
  }
  return Math.floor((Math.floor(((b * 2 + 31 + Math.floor(e / 4)) * 50) / 100) + 5) * (arguments[3] || 1.0));
}

function normalizeMoveCategoryValue(value){
  const v = String(value || "").toLowerCase();
  if (!v) return "";
  if (v.includes("special") || v.includes("特殊")) return "special";
  if (v.includes("physical") || v.includes("物理")) return "physical";
  if (v.includes("status") || v.includes("変化")) return "status";
  return v;
}

function getMoveCategoryLabel(move){
  const category = getMoveCategory(move);
  if (category === "special") return "特殊";
  if (category === "physical") return "物理";

}

function getMoveCategory(move){
  return normalizeMoveCategoryValue(
    move && (
      move.damage_class ||
      move.damageClass ||
      move.class ||
      move.class_jp ||
      move.category ||
      move.move_category ||
      move.classification ||
      move.kind ||
      move.分類 ||
      ""
    )
  );
}

function getMoveType(move){
  const raw = String(
    move && (
      move.type ||
      move.move_type ||
      move.moveType ||
      move.タイプ ||
      ""
    )
  ).trim();

  if(!raw) return "";

  // 英語→日本語（最低限）
  const map = {
    normal:"ノーマル", fire:"ほのお", water:"みず", electric:"でんき",
    grass:"くさ", ice:"こおり", fighting:"かくとう", poison:"どく",
    ground:"じめん", flying:"ひこう", psychic:"エスパー", bug:"むし",
    rock:"いわ", ghost:"ゴースト", dragon:"ドラゴン", dark:"あく",
    steel:"はがね", fairy:"フェアリー"
  };

  const lower = raw.toLowerCase();
  if(map[lower]) return map[lower];

  return raw;
}

function getMovePower(move){
  const power = move && (
    move.power ??
    move.base_power ??
    move.basePower ??
    move.威力 ??
    ""
  );

function getResolvedMovePower(move, context = {}){
  const basePowerRaw = getMovePower(move);
  const basePower = Number(basePowerRaw);
  const name = getMoveDisplayName(move);
  const attackerSpeed = Number(context.attackerSpeed || getDisplayedStatValue("attacker", "speed") || 0);
  const defenderSpeed = Math.max(1, Number(context.defenderSpeed || getDisplayedStatValue("defender", "speed") || 1));
  const attackerHpPct = getSideCurrentHpPercent("attacker") / 100;
  const defenderHpPct = getSideCurrentHpPercent("defender") / 100;
  const attackerWeight = getSideWeightKg("attacker");
  const defenderWeight = getSideWeightKg("defender");

  if (!Number.isFinite(basePower) || basePower <= 0) {
    return basePowerRaw;
  }

  if (name === "アクロバット") {
    return hasSelectedItem("attacker") ? basePower : 110;
  }
  if (name === "はたきおとす") {
    return defenderHasAnyItemForKnockOff() ? 97 : 65;
  }
  if (name === "からげんき") {
    return isAttackerBurned() ? 140 : 70;
  }
  if (name === "しおみず") {
    return defenderHpPct <= 0.5 ? 130 : 65;
  }
  if (name === "しおふき" || name === "ふんか" || name === "ドラゴンエナジー") {
    return Math.max(1, Math.floor(150 * attackerHpPct));
  }
  if (name === "きしかいせい" || name === "じたばた") {
    if (attackerHpPct <= (2 / 48)) return 200;
    if (attackerHpPct <= (5 / 48)) return 150;
    if (attackerHpPct <= (10 / 48)) return 100;
    if (attackerHpPct <= (17 / 48)) return 80;
    if (attackerHpPct <= (33 / 48)) return 40;
    return 20;
  }
  if (name === "けたぐり" || name === "くさむすび") {
    if (!(defenderWeight > 0)) return basePower;
    if (defenderWeight < 10) return 20;
    if (defenderWeight < 25) return 40;
    if (defenderWeight < 50) return 60;
    if (defenderWeight < 100) return 80;
    if (defenderWeight < 200) return 100;
    return 120;
  }
  if (name === "ヘビーボンバー" || name === "ヒートスタンプ") {
    if (!(attackerWeight > 0) || !(defenderWeight > 0)) return basePower;
    const ratio = attackerWeight / Math.max(defenderWeight, 0.1);
    if (ratio >= 5) return 120;
    if (ratio >= 4) return 100;
    if (ratio >= 3) return 80;
    if (ratio >= 2) return 60;
    return 40;
  }
  if (name === "ジャイロボール") {
    if (!attackerSpeed || !defenderSpeed) return basePower;
    return Math.max(1, Math.min(150, Math.floor((25 * defenderSpeed) / Math.max(1, attackerSpeed)) + 1));
  }
  if (name === "エレキボール") {
    if (!attackerSpeed || !defenderSpeed) return basePower;
    const ratio = attackerSpeed / Math.max(1, defenderSpeed);
    if (ratio >= 4) return 150;
    if (ratio >= 3) return 120;
    if (ratio >= 2) return 80;
    if (ratio >= 1) return 60;
    return 40;
  }
  if (name === "アシストパワー" || name === "つけあがる") {
    return Math.max(20, 20 + Math.max(0, getStageSumFromUi()) * 20);
  }
  return basePower;
}


const MULTI_HIT_MOVE_NAMES = new Set([
  "ダブルアタック","にどげり","ホネブーメラン","ダブルニードル","みだれひっかき","みだれづき",
  "タネマシンガン","つっぱり","れんぞくパンチ","トリプルキック","ロックブラスト","ボーンラッシュ",
  "ミサイルばり","つららばり","スイープビンタ","みずしゅりけん","トリプルアクセル",
  "スケイルショット","ドラゴンアロー","あんこくきょうだ","すいりゅうれんだ"
]);

function getMoveHitRange(move){
  const minHits = Number(
    move && (
      move.min_hits ??
      move.minHits ??
      move.hit_min ??
      move.hits_min ??
      move.最小回数 ??
      0
    )
  );
  const maxHits = Number(
    move && (
      move.max_hits ??
      move.maxHits ??
      move.hit_max ??
      move.hits_max ??
      move.最大回数 ??
      0
    )
  );

  if (Number.isFinite(minHits) && Number.isFinite(maxHits) && minHits > 1 && maxHits >= minHits) {
    return { min: minHits, max: maxHits };
  }

  const moveName = String((move && move.name) || "").trim();
  if (moveName === "ダブルアタック" || moveName === "にどげり" || moveName === "ダブルニードル" || moveName === "ホネブーメラン" || moveName === "ドラゴンアロー") {
    return { min: 2, max: 2 };
  }
  if (moveName === "トリプルキック" || moveName === "トリプルアクセル") {
    return { min: 3, max: 3 };
  }
  if (moveName === "あんこくきょうだ" || moveName === "すいりゅうれんだ") {
    return { min: 3, max: 3 };
  }
  if (MULTI_HIT_MOVE_NAMES.has(moveName)) {
    return { min: 2, max: 5 };
  }
  return null;
}

function syncMoveHitsUI(move){
  const wrap = el("move_hits_wrap");
  const select = el("move_hits");
  if (!wrap || !select) return;

  const range = getMoveHitRange(move);
  if (!range) {
    wrap.style.display = "none";
    [...select.options].forEach(opt => { opt.hidden = false; });
    select.value = "1";
    return;
  }

  wrap.style.display = "inline-flex";
  let firstVisible = null;
  [...select.options].forEach(opt => {
    const v = Number(opt.value);
    const visible = v >= range.min && v <= range.max;
    opt.hidden = !visible;
    if (visible && firstVisible === null) firstVisible = opt.value;
  });

  const current = Number(select.value || 1);
  if (current < range.min || current > range.max) {
    select.value = firstVisible || String(range.min);
  }
}

function isStatusMove(move){
  const category = getMoveCategory(move);
  const power = getMovePower(move);
  if (category === "status") return true;
  if (String(power) === "-") return false;
  return false;
}

function getMoveSearchKeys(move){
  const keys = [];
  const push = (v) => {
    const s = String(v || "").trim();
    if (s && !keys.includes(s)) keys.push(s);
  };
  push(move && move.name);
  push(move && move.jp_name);
  push(move && move.display_name);
  push(move && move.id);
  return keys;
}

async function fetchMoveExtraFromBackend(name){
  const endpoints = [
    `/api/move-detail?name=${encodeURIComponent(name)}`,
    `/api/move?name=${encodeURIComponent(name)}`,
    `/api/move-info?name=${encodeURIComponent(name)}`
  ];

  for (const url of endpoints){
    try{
      const res = await fetch(url);
      if (!res.ok) continue;
      const data = await res.json();
      if (data && typeof data === "object") return data;
    }catch(e){}
  }
  return null;
}

async function fetchMoveExtraFromPokeAPI(name){
  const aliases = {
    "かみなり":"thunder",
    "10まんボルト":"thunderbolt",
    "シャドーボール":"shadow-ball",
    "りゅうせいぐん":"draco-meteor",
    "りゅうのはどう":"dragon-pulse",
    "オーバーヒート":"overheat",
    "だいもんじ":"fire-blast",
    "れいとうビーム":"ice-beam",
    "ハイドロポンプ":"hydro-pump",
    "なみのり":"surf"
  };

  const candidates = [String(name || "").trim()];
  if (aliases[name]) candidates.unshift(aliases[name]);

  for (const candidate of candidates){
    if (!candidate) continue;
    try{
      const res = await fetch(`https://pokeapi.co/api/v2/move/${encodeURIComponent(candidate)}`);
      if (!res.ok) continue;
      const data = await res.json();
      return {
        power: data.power,
        damage_class: data.damage_class && data.damage_class.name,
        type: data.type && data.type.name
      };
    }catch(e){}
  }
  return null;
}

async function enrichMove(move){
  const key = getMoveSearchKeys(move)[0] || JSON.stringify(move || {});
  if (moveInfoCache.has(key)) {
    return Object.assign({}, move || {}, moveInfoCache.get(key) || {});
  }

  let extra = null;
  for (const searchKey of getMoveSearchKeys(move)){
    extra = await fetchMoveExtraFromBackend(searchKey);
    if (extra) break;
  }

  if (!extra){
    for (const searchKey of getMoveSearchKeys(move)){
      extra = await fetchMoveExtraFromPokeAPI(searchKey);
      if (extra) break;
    }
  }

  moveInfoCache.set(key, extra || {});
  return Object.assign({}, move || {}, extra || {});
}

function proxiedSpriteUrl(url){
  const raw = String(url || "").trim();
  if (!raw) return "";
  if (raw.startsWith("/")) return raw;
  return `/api/sprite?url=${encodeURIComponent(raw)}`;
}

function withImageCacheBust(url){
  const raw = String(url || "").trim();
  if (!raw) return "";
  const sep = raw.includes("?") ? "&" : "?";
  return `${raw}${sep}ui=${Date.now()}`;
}

function setPokemonSprite(side, data){
  const sprite = el(`${side}_sprite`);
  if (!sprite) return;

  const apiName = String((data || {}).api_name || "").trim();
  const rawUrl = proxiedSpriteUrl((data || {}).sprite);
  const fallbackUrl = apiName ? `/static/sprites/${apiName}.png` : "";
  const nextUrl = withImageCacheBust(rawUrl || fallbackUrl);

  sprite.alt = String((data || {}).jp_name || apiName || "");
  if (!nextUrl) {
    sprite.removeAttribute("src");
    return;
  }

  sprite.onerror = () => {
    if (fallbackUrl && !String(sprite.src || "").includes(fallbackUrl)) {
      sprite.src = withImageCacheBust(fallbackUrl);
    }
  };
  sprite.src = nextUrl;
}

function applyModifier4096(value, modifier){
  const base = Number(value || 0);
  const mod = Number(modifier || 4096);
  const quotient = Math.floor(base * mod / 4096);
  const remainder = (base * mod) % 4096;
  if (remainder > 2048) return Math.max(1, quotient + 1);
  return Math.max(1, quotient);
}

function applyTypeEffectiveness(value, effectiveness){
  return Math.max(0, Math.floor(value * Number(effectiveness || 0)));
}

function applyModifierChain4096(value, modifiers){
  let result = Math.max(0, Number(value || 0));
  for (const modifier of modifiers || []){
    result = applyModifier4096(result, Number(modifier || 4096));
  }
  return Math.max(0, result);
}


function calcStage1DamageRange(move){
  const level = 50;
  const baseCategory = getMoveCategory(move);
  const baseMoveType = getMoveType(move);
  const attackerAbility = getSelectedAbility("attacker");
  const defenderAbility = getSelectedAbility("defender");
  const attackerTeraType = getSelectedTeraType("attacker");
  const defenderTypes = formState.defender ? (detailCache.get(formState.defender)?.types || []) : [];
  const attackerTypes = formState.attacker ? (detailCache.get(formState.attacker)?.types || []) : [];
  const effectiveDefenderTypes = getEffectiveDefenderTypes(defenderTypes);
  const ignoresDefenderAbility = isMoldBreakerLikeAbility(attackerAbility);

  const atkStatRaw = getDisplayedStatValue("attacker", "attack");
  const spAtkStatRaw = getDisplayedStatValue("attacker", "special_attack");
  const category = getTeraBurstCategory(move, atkStatRaw, spAtkStatRaw);
  const moveType = isTeraBurst(move) ? getTeraBurstType(baseMoveType) : baseMoveType;
  if (!category || !moveType) return null;

  const statKeys = getMoveOffenseDefenseKeys(move, category);
  const attackStatSource = statKeys.useDefenderAttack ? "defender" : "attacker";
  const attackStat = getDisplayedStatValue(attackStatSource, statKeys.atkKey);
  const defenseStat = getDisplayedStatValue("defender", statKeys.defKey);
  const defenderHp = getDisplayedStatValue("defender", "hp");
  if(!attackStat || !defenseStat || !defenderHp) return null;

  const effectiveness = getTypeEffectiveness(moveType, effectiveDefenderTypes);
  const stabMult = getTeraStabMultiplier(moveType, attackerTypes, attackerTeraType, attackerAbility);
  const stabModifier = Math.round(stabMult * 4096);
  const critical = isCriticalHit();
  const resolvedPower = Number(getResolvedMovePower(move, {
    attackerSpeed: getDisplayedStatValue("attacker", "speed"),
    defenderSpeed: getDisplayedStatValue("defender", "speed")
  }));
  if (!resolvedPower) return null;

  const {
    atkRank,
    defRank,
    attackItemMult,
    powerItemMult,
    finalDamageItemMult,
    defenseItemMult
  } = getSelectedCalcValues(category, effectiveness);

  const atkRankBase = (!ignoresDefenderAbility && defenderAbility === "てんねん") ? 0 : atkRank;
  const defRankBase = (attackerAbility === "てんねん") ? 0 : defRank;
  const appliedAtkRank = critical && atkRankBase < 0 ? 0 : atkRankBase;
  const appliedDefRank = critical && defRankBase > 0 ? 0 : defRankBase;

  const rankedAttack = Math.max(1, Math.floor(attackStat * getRankMultiplier(appliedAtkRank)));
  const rankedDefense = Math.max(1, Math.floor(defenseStat * getRankMultiplier(appliedDefRank)));

  const attackAbilityMult = getAbilityAttackMultiplier(attackerAbility, move, category);
  const defenseAbilityStatMult = ignoresDefenderAbility ? 1 : getAbilityDefenseStatMultiplier(defenderAbility, category);
  const baseTakenAbilityMult = ignoresDefenderAbility ? 1 : getAbilityTakenMultiplier(defenderAbility, move, category);
  const hpConditionalTakenAbilityMult = getHpConditionalTakenAbilityMultiplier(
    defenderAbility,
    moveType,
    effectiveness,
    defenderHp,
    ignoresDefenderAbility
  );
  const takenAbilityMult = baseTakenAbilityMult * hpConditionalTakenAbilityMult;
  let finalDamageAbilityMult = 1;
  if (attackerAbility === "いろめがね" && effectiveness > 0 && effectiveness < 1) {
    finalDamageAbilityMult *= 2;
  }
  if (attackerAbility === "スナイパー" && critical) {
    finalDamageAbilityMult *= 1.5;
  }

  const attackItemModifier = Math.round(attackItemMult * 4096);
  const attackAbilityModifier = Math.round(attackAbilityMult * 4096);
  const defenseItemModifier = Math.round(defenseItemMult * 4096);
  const defenseAbilityModifier = Math.round(defenseAbilityStatMult * 4096);

  const effectiveAttack = Math.max(1, applyModifierChain4096(rankedAttack, [
    attackItemModifier,
    attackAbilityModifier,
  ]));
  let effectiveDefense = Math.max(1, applyModifierChain4096(rankedDefense, [
    defenseItemModifier,
    defenseAbilityModifier,
  ]));

  const weather = getSelectedWeather();
  const field = getSelectedField();
  const grounded = isAttackerGrounded();

  if (weather === "sand" && defenderTypes.includes("いわ") && category === "special") {
    effectiveDefense = Math.max(1, applyModifier4096(effectiveDefense, 6144));
  }

  let weatherModifier = 4096;
  if (weather === "sunny") {
    if (moveType === "ほのお") weatherModifier = 6144;
    else if (moveType === "みず") weatherModifier = 2048;
  } else if (weather === "rain") {
    if (moveType === "みず") weatherModifier = 6144;
    else if (moveType === "ほのお") weatherModifier = 2048;
  }

  let fieldModifier = 4096;
  if (grounded) {
    if (field === "electric" && moveType === "でんき") fieldModifier = 5325;
    else if (field === "grassy" && moveType === "くさ") fieldModifier = 5325;
    else if (field === "psychic" && moveType === "エスパー") fieldModifier = 5325;
    else if (field === "misty" && moveType === "ドラゴン") fieldModifier = 2048;
  }

  const powerItemModifier = Math.round(powerItemMult * 4096);
  const adjustedPower = Math.max(1, applyModifierChain4096(resolvedPower, [powerItemModifier, weatherModifier, fieldModifier]));

  const step1 = Math.floor((level * 2) / 5 + 2);
  const step2 = Math.floor(step1 * adjustedPower * effectiveAttack / effectiveDefense);
  const step3 = Math.floor(step2 / 50);
  const baseDamage = Math.max(1, step3 + 2);

  const isPhysical = category === "physical";
  const wall = getSelectedWall();
  const isScreenActive =
    !critical &&
    (
      (isPhysical && (wall === "reflect" || wall === "aurora_veil")) ||
      (!isPhysical && (wall === "light_screen" || wall === "aurora_veil"))
    );
  const wallModifier = isScreenActive ? 2048 : 4096;

  const burnBlocked = String(attackerAbility || "").trim() === "こんじょう" || getMoveDisplayName(move) === "からげんき";
  const isBurnPenalty = isPhysical && isAttackerBurned() && moveType !== "ほのお" && !burnBlocked;
  const burnModifier = isBurnPenalty ? 2048 : 4096;

  const finalDamageModifier = Math.round(finalDamageItemMult * finalDamageAbilityMult * 4096);
  const criticalModifier = critical ? 6144 : 4096;
  const finalDamageModifiers = [criticalModifier, burnModifier, wallModifier, finalDamageModifier];

  const hitCount = getMoveHits();
  const rolls = [];
  for (let r = 85; r <= 100; r++) {
    let singleHitDamage = Math.max(1, Math.floor(baseDamage * (r / 100)));
    singleHitDamage = applyModifier4096(singleHitDamage, stabModifier);
    singleHitDamage = applyTypeEffectiveness(singleHitDamage, effectiveness);
    if (takenAbilityMult === 0) {
      singleHitDamage = 0;
    } else {
      if (takenAbilityMult !== 1) {
        singleHitDamage = applyModifier4096(singleHitDamage, Math.round(takenAbilityMult * 4096));
      }
      singleHitDamage = applyModifierChain4096(singleHitDamage, finalDamageModifiers);
    }
    rolls.push(singleHitDamage * hitCount);
  }

  const minDamage = Math.min(...rolls);
  const maxDamage = Math.max(...rolls);
  const minPct = Math.floor((minDamage / defenderHp) * 1000) / 10;
  const maxPct = Math.floor((maxDamage / defenderHp) * 1000) / 10;

  const getKoChance = (hits) => {
    const all = Math.pow(16, hits);
    let ko = 0;
    const recur = (depth, total) => {
      if (depth === hits) {
        if (total >= defenderHp) ko += 1;
        return;
      }
      for (const roll of rolls) recur(depth + 1, total + roll);
    };
    recur(0, 0);
    return (ko / all) * 100;
  };

  return {
    minDamage,
    maxDamage,
    minPct,
    maxPct,
    oneHitChance: getKoChance(1),
    twoHitChance: getKoChance(2),
    threeHitChance: getKoChance(3),
    fourHitChance: getKoChance(4),
    rolls,
    critical,
    resolvedPower,
    category,
    moveType
  };
}


function getDamageBarColors(remainingPct){
  if (remainingPct <= 20){
    return { base: "#ef5350", overlay: "#c62828" };
  }
  if (remainingPct <= 50){
    return { base: "#ffb329", overlay: "#8b6512" };
  }
  return { base: "#66bb6a", overlay: "#2e7d32" };
}

function getBarColor(pct){
  if (pct <= 20) return {base:"#ef5350", strong:"#c62828"};
  if (pct <= 50) return {base:"#ffd54f", strong:"#8b6512"};
  return {base:"#66bb6a", strong:"#2e7d32"};
}

function updateDamagePanel(move){
  const textEl = el("damage_panel_text");
  const randomEl = el("damage_bar_random");
  const guaranteedEl = el("damage_bar_guaranteed");
  const barEl = randomEl ? randomEl.parentElement : null;

  if(!textEl || !randomEl || !guaranteedEl || !barEl) return;

  const resetBar = () => {
    barEl.style.background = "#66bb6a";
    randomEl.style.width = "0%";
    randomEl.style.right = "0%";
    guaranteedEl.style.width = "0%";
    guaranteedEl.style.right = "0%";
    randomEl.style.background = "#2e7d32";
    guaranteedEl.style.background = "#ffffff";
  };

  if(!move){
    textEl.textContent = "ダメージ計算待機中";
    resetBar();
    return;
  }

  const result = calcStage1DamageRange(move);
  if(!result){
    textEl.textContent = "ダメージ計算待機中";
    resetBar();
    return;
  }

  const hp = getDisplayedStatValue("defender","hp");
  if(!hp){
    textEl.textContent = "ダメージ計算待機中";
    resetBar();
    return;
  }

  const minPct = Math.max(0, Math.min(100, (result.minDamage / hp) * 100));
  const maxPct = Math.max(0, Math.min(100, (result.maxDamage / hp) * 100));
  const diffPct = Math.max(0, maxPct - minPct);

  const remainingPct = 100 - maxPct;
  const color = getBarColor(remainingPct);

  // base bar = remaining HP color
  barEl.style.background = color.base;

  // white = guaranteed damage only (far right)
  guaranteedEl.style.right = "0%";
  guaranteedEl.style.width = `${minPct}%`;
  guaranteedEl.style.background = "#ffffff";

  // dark = random-only damage, immediately left of white
  randomEl.style.right = `${minPct}%`;
  randomEl.style.width = `${diffPct}%`;
  randomEl.style.background = color.strong;

  const rangeText = `${result.minDamage}～${result.maxDamage}`;
  const pctText = `(${result.minPct}～${result.maxPct}%)`;
  const formatChance = (chance) => {
    const rounded = Math.floor((Number(chance || 0) + 1e-10) * 100) / 100;
    return rounded.toFixed(2).replace(/\.00$/, '').replace(/(\.\d)0$/, '$1');
  };
  let hitText = "";
  if(result.oneHitChance >= 100){
    hitText = "確定1発";
  }else if(result.oneHitChance > 0){
    hitText = `乱数1発: ${formatChance(result.oneHitChance)}%`;
  }else if(result.twoHitChance >= 100){
    hitText = "確定2発";
  }else if(result.twoHitChance > 0){
    hitText = `乱数2発: ${formatChance(result.twoHitChance)}%`;
  }else if(result.threeHitChance >= 100){
    hitText = "確定3発";
  }else if(result.threeHitChance > 0){
    hitText = `乱数3発: ${formatChance(result.threeHitChance)}%`;
  }else if(result.fourHitChance >= 100){
    hitText = "確定4発";
  }else if(result.fourHitChance > 0){
    hitText = `乱数4発: ${formatChance(result.fourHitChance)}%`;
  }else{
    hitText = "5発以上";
  }
  const tags = [];
  if (result.critical) tags.push("急所");
  if (getMoveHits() > 1) tags.push(`連続技${getMoveHits()}回`);
  if (getSelectedWall()) tags.push(
    getSelectedWall() === "reflect" ? "リフレクター" :
    getSelectedWall() === "light_screen" ? "ひかりのかべ" :
    "オーロラベール"
  );
  if (getSelectedWeather() === "sand") tags.push("砂");
  if (getSelectedWeather() === "snow") tags.push("雪");
  if (isAttackerBurned()) tags.push("やけど");
  if (isAttackerCharged()) tags.push("じゅうでん");
  if (getSelectedField() && isAttackerGrounded()) tags.push("接地");
  const extraText = tags.length ? ` ${tags.join(" / ")}` : "";
  textEl.textContent = `${rangeText} ${pctText} ${hitText}${extraText}`;
}

function getMegaCandidates(base){
  const forced = FORCED_MEGA_MAP[base] || [];
  const actual = getPokemonNames().filter(name => {
    const n = normalizeName(name);
    return n.startsWith(normalizeName(`メガ${base}`)) || n.startsWith(normalizeName(`ゲンシ${base}`));
  });

  const synthetic = forced.filter(name => !actual.some(v => normalizeName(v) === normalizeName(name)));
  return uniq(actual.concat(synthetic));
}

async function getRelatedForms(name){
  const currentName = String(name || "").trim();
  const base = getBaseName(currentName);
  const fallbackBase = base || currentName;

  const collected = [];
  const seen = new Set();

  function addForm(v){
    const value = String(v || "").trim();
    const key = normalizeName(value);
    if (!value || !key || seen.has(key)) return;
    seen.add(key);
    collected.push(value);
  }

  addForm(fallbackBase);
  getForcedFormNames(fallbackBase).forEach(addForm);
  getMegaCandidates(fallbackBase).forEach(addForm);

  async function fetchForms(queryName){
    if (!queryName) return;
    try {
      const res = await fetch(`/api/pokemon-forms?name=${encodeURIComponent(queryName)}`);
      const data = await res.json();
      if (res.ok && Array.isArray(data.forms)) {
        data.forms.forEach(addForm);
        if (data.base_name) addForm(data.base_name);
        getForcedFormNames(data.base_name || fallbackBase).forEach(addForm);
        getMegaCandidates(data.base_name || fallbackBase).forEach(addForm);
      }
    } catch (e) {}
  }

  await fetchForms(currentName);
  if (fallbackBase && normalizeName(fallbackBase) !== normalizeName(currentName)) {
    await fetchForms(fallbackBase);
  }

  const normalSeen = new Set();
  const filtered = collected.filter(v => {
    const label = getFormLabel(v);
    if (label !== "通常") return true;
    const normalKey = normalizeName(getBaseName(v));
    if (normalSeen.has(normalKey)) return false;
    normalSeen.add(normalKey);
    return true;
  });

  const order = ["通常", "けんのおう", "たてのおう", "こくばじょう", "はくばじょう", "いちげきのかた", "れんげきのかた", "いちげき", "れんげき", "アローラ", "ガラル", "ヒスイ", "パルデア", "メガ", "メガX", "メガY", "ゲンシ"];
  filtered.sort((a, b) => {
    const la = getFormLabel(a);
    const lb = getFormLabel(b);
    const ai = order.indexOf(la);
    const bi = order.indexOf(lb);
    if (ai !== -1 || bi !== -1) return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
    return a.localeCompare(b, "ja");
  });

  return filtered;
}

function getNormalFormName(forms, currentName){
  const exactNormal = forms.find(v => getFormLabel(v) === "通常");
  if (exactNormal) return exactNormal;
  const base = getBaseName(currentName);
  if (hasPokemonName(base)) return getPokemonNames().find(v => normalizeName(v) === normalizeName(base)) || base;
  return base || currentName;
}

function getMegaButtonItems(forms){
  const seen = new Set();
  return forms
    .filter(v => ["メガ", "メガX", "メガY", "ゲンシ"].includes(getFormLabel(v)))
    .map(v => ({name: v, label: getFormLabel(v)}))
    .filter(item => {
      const key = normalizeFormLabel(item.label);
      if (seen.has(key)) return false;
      seen.add(key);
      return true;
    });
}

function getStandardFormItems(forms, currentName){
  const seen = new Set();
  const items = [];

  forms.forEach(v => {
    const label = getFormLabel(v);
    if (["メガ", "メガX", "メガY", "ゲンシ"].includes(label)) return;

    const normalizedLabel = normalizeFormLabel(label);
    if (seen.has(normalizedLabel)) return;
    seen.add(normalizedLabel);
    items.push({name: v, label});
  });

  if (!items.some(item => item.label === "通常")) {
    const normalName = getNormalFormName(forms, currentName);
    items.unshift({name: normalName, label: "通常"});
  }

  const order = ["通常", "いちげきのかた", "れんげきのかた", "いちげき", "れんげき", "アローラ", "ガラル", "ヒスイ", "パルデア"];
  items.sort((a, b) => {
    const ai = order.indexOf(a.label);
    const bi = order.indexOf(b.label);
    if (ai !== -1 || bi !== -1) return (ai === -1 ? 999 : ai) - (bi === -1 ? 999 : bi);
    return a.label.localeCompare(b.label, "ja");
  });

  return items;
}

function renderMegaButtons(side, forms, currentName){
  const wrap = document.createElement("div");
  wrap.className = "mega-buttons";

  const megaItems = getMegaButtonItems(forms);
  const currentLabel = getFormLabel(currentName);

  if (megaItems.length === 0){
    const badge = document.createElement("div");
    badge.className = "mega-badge";
    badge.textContent = "メガなし";
    wrap.appendChild(badge);
    return wrap;
  }

  megaItems.forEach(item => {
    const btn = document.createElement("button");
    btn.type = "button";
    btn.className = `mega-btn ${normalizeFormLabel(item.label) === normalizeFormLabel(currentLabel) ? "is-active" : "is-off"}`;
    btn.textContent = item.label;
    btn.title = item.name;
    btn.addEventListener("click", () => load(side, item.name));
    wrap.appendChild(btn);
  });

  return wrap;
}

async function renderFormUI(side, currentName){
  const row = el(`${side}_form_row`);
  if (!row) return;

  const token = (formRenderTokens[side] || 0) + 1;
  formRenderTokens[side] = token;

  row.innerHTML = "";

  const forms = await getRelatedForms(currentName);

  if (formRenderTokens[side] !== token) return;

  row.innerHTML = "";

  const line = document.createElement("div");
  line.className = "form-line";

  const standardItems = getStandardFormItems(forms, currentName);
  if (standardItems.length > 1) {
    const select = document.createElement("select");

const statusMoveDescriptionCache = new Map();

async function fetchStatusMoveDescription(move){
  const apiName = String(move && (move.api_name || move.apiName) || "").trim();
  const name = String(move && (move.name || move.jp_name || move.display_name) || "").trim();
  const cacheKey = apiName || name;
  if (!cacheKey) return "";
  if (statusMoveDescriptionCache.has(cacheKey)) return statusMoveDescriptionCache.get(cacheKey) || "";

  try {
    const qs = apiName
      ? `api_name=${encodeURIComponent(apiName)}`
      : `name=${encodeURIComponent(name)}`;
    const res = await fetch(`/api/move-detail?${qs}`);
    const data = await res.json();
    const desc = String(data && data.description || "").trim();
    if (desc) {
      statusMoveDescriptionCache.set(cacheKey, desc);
      return desc;
    }
  } catch (e) {}
  return "";
}

function setStatusMoveOptions(side, moves){
  const select = el(`${side}_status_move`);
  const descEl = el(`${side}_status_move_desc`);
  if (!select || !descEl) return;

  select.innerHTML = "";
  const list = Array.isArray(moves) ? moves.filter(m => isStatusMove(m)) : [];

  if (!list.length){
    const opt = document.createElement("option");
    opt.value = "";
    opt.textContent = "なし";
    select.appendChild(opt);
    select.disabled = true;
    descEl.textContent = "";
    return;
  }

  select.disabled = false;
  list.forEach((move, idx) => {
    const opt = document.createElement("option");
    opt.value = move.name || "";
    opt.textContent = move.name || "";
    opt.dataset.move = JSON.stringify(move || {});
    if (idx === 0) opt.selected = true;
    select.appendChild(opt);
  });

  select.onchange = () => updateStatusMoveDescription(side);
  updateStatusMoveDescription(side);
}

function updateStatusMoveDescription(side){
  const select = el(`${side}_status_move`);
  const descEl = el(`${side}_status_move_desc`);
  if (!select || !descEl) return;

  const sel = select.selectedOptions && select.selectedOptions[0];
  if (!sel || !sel.dataset.move){
    descEl.textContent = "";
    return;
  }

  let move = {};
  try {
    move = JSON.parse(sel.dataset.move || "{}");
  } catch (e) {
    move = {};
  }

  const cacheKey = String(move.name || sel.value || "").trim();
  const apiName = String(move.api_name || move.apiName || "").trim();
  const desc = String(
    move.description ??
    move.desc ??
    move.effect ??
    move.effect_text ??
    move.flavor_text ??
    ""
  ).trim();

  const storeKey = apiName || cacheKey;
  if (storeKey && desc) statusMoveDescriptionCache.set(storeKey, desc);

  const cachedDesc = (storeKey && statusMoveDescriptionCache.get(storeKey)) || (cacheKey && statusMoveDescriptionCache.get(cacheKey)) || "";
  if (desc || cachedDesc) {
    descEl.textContent = desc || cachedDesc;
    return;
  }

  descEl.textContent = "説明取得中…";
  fetchStatusMoveDescription(move).then(fetched => {
    const currentSelect = el(`${side}_status_move`);
    const currentSel = currentSelect && currentSelect.selectedOptions && currentSelect.selectedOptions[0];
    if (!currentSel) return;
    if (currentSel.value !== (move.name || sel.value || "")) return;
    descEl.textContent = fetched || "";
  }).catch(() => {
    descEl.textContent = "";
  });
}

async function load(side, name){
  if(!name) return;

  const previousName = formState[side] || '';
  if (previousName) savePokemonSliderState(side, previousName);
  el("status").textContent = "読み込み中…";

  const resolved = await resolvePokemonDetail(name);

  if(!resolved){
    el("status").textContent = `${name} の詳細取得失敗`;
    return;
  }

  const resolvedName = resolved.resolvedName;
  const data = resolved.data;

  formState[side] = resolvedName;
  sideAbilityDescriptions[side] = data.ability_descriptions || {};
  setPokemonSprite(side, data);
  renderTypeIcons(side, data.types || []);
  renderWeakness(side, data.types || []);
  renderStatsInline(side, data.stats || {});
  sideBaseStats[side] = deriveBaseStatsFromActual(data.stats || {});
  updateDisplayedStats(side);
  el(`${side}_search`).value = getBaseName(resolvedName) || resolvedName;
  await renderFormUI(side, resolvedName);
  renderAbility(side, data.abilities || []);
  setStatusMoveOptions(side, data.moves || []);

  if(side === "attacker"){
    const moveSelect = el("move_name");
    moveSelect.innerHTML = "";

    const rawMoves = Array.isArray(data.moves) ? data.moves : [];
    const visibleMoves = rawMoves.filter(m => !isStatusMove(m));

    visibleMoves.forEach(m => {
      const opt = document.createElement("option");
      opt.value = m.name || "";
      opt.textContent = m.name || "";
      opt.dataset.move = JSON.stringify(m);
      moveSelect.appendChild(opt);
    });

    const renderSelectedMove = async () => {
      const sel = moveSelect.selectedOptions[0];
      if(!sel || !sel.dataset.move){
        renderMoveDetail(null);
        updateAtkEvLabel(null);
        updateDamagePanel(null);
        return;
      }
      const rawMove = JSON.parse(sel.dataset.move);
      const enrichedMove = await enrichMove(rawMove);
      renderMoveDetail(enrichedMove);
      updateAtkEvLabel(enrichedMove);
    };

    moveSelect.onchange = renderSelectedMove;

    if(moveSelect.options.length){
      await renderSelectedMove();
    } else {
      renderMoveDetail(null);
      updateAtkEvLabel(null);
    }
  }

  applyPokemonSliderState(side, getPokemonSliderState(side, resolvedName));
  el("status").textContent = `準備完了（${pokemonList.length}件）`;
}

function getMatchedPokemon(query){
  const q = normalizeName(query);
  const entries = getPokemonSearchEntries();

  if (!q) return entries.map(entry => entry.display).slice(0, 20);

  const starts = [];
  const contains = [];

  entries.forEach(entry => {
    const aliases = entry.aliases || [entry.display];
    if (aliases.some(alias => normalizeName(alias).startsWith(q))) {
      starts.push(entry.display);
    } else if (aliases.some(alias => normalizeName(alias).includes(q))) {
      contains.push(entry.display);
    }
  });

  return uniq(starts.concat(contains)).slice(0, 20);
}

async function getMatchedPokemonFromServer(query){
  try {
    const res = await fetch(`/api/pokemon-search?q=${encodeURIComponent(String(query || ""))}`, {cache: "no-store"});
    const data = await res.json();
    if (res.ok && Array.isArray(data.pokemon)) {
      return data.pokemon.map(p => getDisplayName(p)).filter(Boolean);
    }
  } catch (e) {}
  return getMatchedPokemon(query);
}

function hideSuggest(side){
  const box = el(`${side}_suggest`);
  box.style.display = "none";
  box.innerHTML = "";
  box.dataset.index = "-1";
}

function showSuggest(side, names){
  const box = el(`${side}_suggest`);
  box.innerHTML = "";

  if (!names || names.length === 0){
    hideSuggest(side);
    return;
  }

  names.forEach((name, idx) => {
    const item = document.createElement("div");
    item.className = "suggest-item";
    item.textContent = name;
    item.dataset.index = String(idx);
    item.addEventListener("mousedown", (e) => {
      e.preventDefault();
      el(`${side}_search`).value = name;
      hideSuggest(side);
      load(side, name);
    });
    box.appendChild(item);
  });

  box.dataset.index = "-1";
  box.style.display = "block";
}

function moveSuggest(side, dir){
  const box = el(`${side}_suggest`);
  const items = [...box.querySelectorAll(".suggest-item")];
  if (!items.length) return;

  let idx = Number(box.dataset.index || "-1");
  idx += dir;
  if (idx < 0) idx = items.length - 1;
  if (idx >= items.length) idx = 0;
  box.dataset.index = String(idx);

  items.forEach((item, i) => item.classList.toggle("active", i === idx));
  items[idx].scrollIntoView({block:"nearest"});
}

function chooseSuggest(side){
  const box = el(`${side}_suggest`);
  const items = [...box.querySelectorAll(".suggest-item")];
  const idx = Number(box.dataset.index || "-1");

  if (idx >= 0 && items[idx]){
    const name = items[idx].textContent;
    el(`${side}_search`).value = name;
    hideSuggest(side);
    load(side, name);
    return true;
  }

  const found = findPokemonName(el(`${side}_search`).value);
  if(found){
    el(`${side}_search`).value = found;
    hideSuggest(side);
    load(side, found);
    return true;
  }
  const raw = String(el(`${side}_search`).value || "").trim();
  if (raw) {
    hideSuggest(side);
    load(side, raw);
    return true;
  }
  return false;
}

function bindSuggest(side){
  const input = el(`${side}_search`);
  let suggestToken = 0;
  let searchTimer = null;

  async function refreshSuggest(){
    const token = ++suggestToken;
    const names = await getMatchedPokemonFromServer(input.value);
    if (token !== suggestToken) return;
    showSuggest(side, names);
  }

  function loadExactInputSoon(){
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      const found = findPokemonName(input.value);
      if (found && normalizeName(found) === normalizeName(input.value)) {
        load(side, found);
      }
    }, 120);
  }

  input.addEventListener("input", () => {
    loadExactInputSoon();
    refreshSuggest();
  });

  input.addEventListener("focus", () => {
    input.select();
    refreshSuggest();
  });

  input.addEventListener("click", () => {
    input.select();
    refreshSuggest();
  });

  input.addEventListener("keydown", (e) => {
    if (e.key === "ArrowDown"){
      e.preventDefault();
      refreshSuggest();
      moveSuggest(side, 1);
      return;
    }
    if (e.key === "ArrowUp"){
      e.preventDefault();
      refreshSuggest();
      moveSuggest(side, -1);
      return;
    }
    if (e.key === "Enter"){
      e.preventDefault();
      chooseSuggest(side);
      return;
    }
    if (e.key === "Escape"){
      hideSuggest(side);
    }
  });

  input.addEventListener("blur", () => {
    searchSet(side);
    setTimeout(() => hideSuggest(side), 120);
  });
}

function findPokemonName(val){
  const q = normalizeName(val);
  const entries = getPokemonSearchEntries();

  const exact = entries.find(entry => (entry.aliases || []).some(v => normalizeName(v) === q));
  if (exact) return exact.display;

  const starts = entries.find(entry => (entry.aliases || []).some(v => normalizeName(v).startsWith(q)));
  if (starts) return starts.display;

  return entries.find(entry => normalizeName(getBaseName(entry.display)) === normalizeName(getBaseName(val)))?.display
    || "";
}

function searchSet(side){
  const val = el(`${side}_search`).value;
  const found = findPokemonName(val);
  if(found){
    load(side, found);
  } else if (String(val || "").trim()) {
    load(side, val);
  }
}

async function swapPokemon(){
  const attackerName = formState.attacker || el("attacker_search").value;
  const defenderName = formState.defender || el("defender_search").value;
  const attackerState = captureSideState("attacker");
  const defenderState = captureSideState("defender");

  const attackerSlots = readSideSlots("attacker");
  const defenderSlots = readSideSlots("defender");
  const attackerActive = readActiveSlotIndex("attacker");
  const defenderActive = readActiveSlotIndex("defender");

  writeSideSlots("attacker", defenderSlots);
  writeSideSlots("defender", attackerSlots);
  writeActiveSlotIndex("attacker", defenderActive);
  writeActiveSlotIndex("defender", attackerActive);

  if (defenderState && defenderName) await applySideState("attacker", defenderState);
  if (attackerState && attackerName) await applySideState("defender", attackerState);

  renderAllSideSlots();
}

function pickDefault(preferred){
  const values = getPokemonNames();
  if (values.includes(preferred)) return preferred;

  const n = normalizeName(preferred);
  const matched = values.find(v => normalizeName(v) === n)
    || values.find(v => normalizeName(getBaseName(v)) === normalizeName(getBaseName(preferred)));

  if (matched) return matched;
  return values[0] || "";
}

function readSideSlots(side){
  try {
    const raw = localStorage.getItem(sideSlotStorageKey(side));
    const parsed = JSON.parse(raw || '[]');
    if (!Array.isArray(parsed)) return new Array(SLOT_COUNT).fill(null);
    return Array.from({length:SLOT_COUNT}, (_,i)=> parsed[i] || null);
  } catch (e) {
    return new Array(SLOT_COUNT).fill(null);
  }
}
function writeSideSlots(side, slots){
  const safe = Array.from({length:SLOT_COUNT}, (_,i)=> (Array.isArray(slots) ? (slots[i] || null) : null));

function readActiveSlotIndex(side){

  const n = Number(raw);
  return Number.isInteger(n) ? n : -1;

function writeActiveSlotIndex(side, idx){

    setCheckbox('move_crit', state.crit);
    setSelect('move_hits', state.hits || '1');
    setRange('move_ev_slider', (savedSliderState && savedSliderState.ev != null) ? savedSliderState.ev : (state.ev || '0'), 'move_ev_value');
    if (typeof updateMoveEvValue === 'function') updateMoveEvValue();
    setSelect('atk_item', state.item || '');
    setSelect('atk_rank', state.rank || '0');
    setActiveNatureValue('atk_nature', state.nature || '1.0');
    setCheckbox('atk_burn', state.burn);
    setCheckbox('atk_charge', state.charge);
    setCheckbox('atk_grounded', state.grounded);
    setInputValue('atk_cur_hp_pct', state.current_hp_pct || '100');
    setInputValue('atk_weight_kg', state.weight_kg || '');
  } else {
    setRange('def_ev_h', (savedSliderState && savedSliderState.ev_h != null) ? savedSliderState.ev_h : (state.ev_h || '0'), 'def_ev_h_val');
    setRange('def_ev_b', (savedSliderState && savedSliderState.ev_b != null) ? savedSliderState.ev_b : (state.ev_b || '0'), 'def_ev_b_val');
    setRange('def_ev_d', (savedSliderState && savedSliderState.ev_d != null) ? savedSliderState.ev_d : (state.ev_d || '0'), 'def_ev_d_val');
    setSelect('def_item_d', state.item || '');
    setSelect('battle_weather', state.weather || '');
    setSelect('battle_field', state.field || '');
    setSelect('def_wall', state.wall || '');
    setSelect('def_rank_b', state.rank_b || '0');
    setSelect('def_rank_d', state.rank_d || '0');
    setActiveNatureValue('def_b_nature', state.nature_b || '1.0');
    setActiveNatureValue('def_d_nature', state.nature_d || '1.0');
    setInputValue('def_cur_hp_pct', state.current_hp_pct || '100');
    setInputValue('def_weight_kg', state.weight_kg || '');
    setCheckbox('def_has_item_other', state.has_item_other);
  }
  if (typeof refreshCurrentDamagePanel === 'function') refreshCurrentDamagePanel();
}
function renderSideSlots(side){
  const wrap = el(`${side}_slots`);
  if (!wrap) return;
  const slots = readSideSlots(side);
  const activeIdx = readActiveSlotIndex(side);
  wrap.innerHTML = '';
  slots.forEach((slot, idx) => {
    const btn = document.createElement('button');
    btn.type = 'button';
    btn.dataset.slotIndex = String(idx);
    btn.className = `poke-slot${slot ? '' : ' empty'}${activeIdx === idx ? ' active' : ''}`;
    btn.title = slot && slot.name ? slot.name : '空き';
    if (slot && slot.sprite) {
      const img = document.createElement('img');
      img.src = slot.sprite;
      img.alt = slot.name || '';
      btn.appendChild(img);
    }
    const label = document.createElement('div');
    label.className = 'poke-slot-label';
    label.textContent = String(idx + 1);
    btn.appendChild(label);
    btn.addEventListener('click', async () => {
      if (!slot) {
        const current = captureSideState(side);
        if (!current || !current.name) return;
        const next = readSideSlots(side);
        next[idx] = current;
        writeSideSlots(side, next);
        writeActiveSlotIndex(side, idx);
        renderSideSlots(side);
        return;
      }
      writeActiveSlotIndex(side, idx);
      renderSideSlots(side);
      await applySideState(side, slot);
      updateSideFastestSlotHighlight(side);
    });
    btn.addEventListener('contextmenu', (ev) => {
      ev.preventDefault();
      const current = captureSideState(side);
      const next = readSideSlots(side);
      if (current && current.name) {
        next[idx] = current;
        writeSideSlots(side, next);
        writeActiveSlotIndex(side, idx);
      } else {
        next[idx] = null;
        writeSideSlots(side, next);
        if (readActiveSlotIndex(side) === idx) writeActiveSlotIndex(side, -1);
      }
      renderSideSlots(side);
    });
    wrap.appendChild(btn);
  });
  updateSideFastestSlotHighlight(side);
}
const slotSpeedHighlightTokens = { attacker:0, defender:0 };

async function getSlotSpeedValue(slot){
  if (!slot || !slot.name) return null;
  const resolved = await resolvePokemonDetail(slot.name);
  const data = resolved && resolved.data ? resolved.data : null;
  if (!data || !data.stats) return null;
  const speed = Number((data.stats || {}).speed || 0);
  return speed > 0 ? speed : null;
}

async function updateSideFastestSlotHighlight(side){
  const wrap = el(`${side}_slots`);
  if (!wrap) return;

  const token = (slotSpeedHighlightTokens[side] || 0) + 1;
  slotSpeedHighlightTokens[side] = token;

  const slots = readSideSlots(side);
  const speedList = await Promise.all(slots.map(slot => getSlotSpeedValue(slot)));
  if (slotSpeedHighlightTokens[side] !== token) return;

  const validSpeeds = speedList.filter(v => Number.isFinite(v) && v > 0);
  const maxSpeed = validSpeeds.length ? Math.max(...validSpeeds) : null;

  [...wrap.querySelectorAll('.poke-slot')].forEach((btn, idx) => {
    const speed = speedList[idx];
    const isFastest = maxSpeed != null && Number.isFinite(speed) && speed === maxSpeed;
    btn.classList.toggle('fastest', !!isFastest);
    const slot = slots[idx];
    if (slot && slot.name) {
      btn.title = isFastest ? `${slot.name} / 最速` : slot.name;
    }
  });
}

function renderAllSideSlots(){
  renderSideSlots('attacker');
  renderSideSlots('defender');
}
function bindSlotUi(){
  const bindReset = (side) => {
    const btn = el(`${side}_slots_reset`);
    if (!btn || btn.dataset.boundSlots) return;
    btn.dataset.boundSlots = '1';
    btn.addEventListener('click', () => {
      writeSideSlots(side, new Array(SLOT_COUNT).fill(null));
      writeActiveSlotIndex(side, -1);
      resetCurrentPokemonSliders(side);
      renderSideSlots(side);
    });
  };
  bindReset('attacker');
  bindReset('defender');
  renderAllSideSlots();
}


async function init(){
  pokemonList = await waitList();
  el("status").textContent = `準備完了（${pokemonList.length}件）`;

  const attackerDefault = pickDefault(DEFAULT_ATTACKER);
  const defenderDefault = pickDefault(DEFAULT_DEFENDER);

  el("attacker_search").value = attackerDefault;
  el("defender_search").value = defenderDefault;

  el("attacker_search").onchange = () => searchSet("attacker");
  el("defender_search").onchange = () => searchSet("defender");

  bindSuggest("attacker");
  bindSuggest("defender");

  document.addEventListener("click", (e) => {
    if (!e.target.closest(".poke-main")){
      hideSuggest("attacker");
      hideSuggest("defender");
    }
  });

  el("swap_btn").addEventListener("click", swapPokemon);

  if (moveEvSlider){
    moveEvSlider.addEventListener("input", updateMoveEvValue);
    moveEvSlider.addEventListener("change", updateMoveEvValue);
    updateMoveEvValue();
  }

  bindDefenderEV();
  bindNatureRows();
  bindCalcControls();
  bindSlotUi();

  const results = await Promise.allSettled([
    load("attacker", attackerDefault),
    load("defender", defenderDefault),
  ]);
  const failed = results.find(result => result.status === "rejected");
  if (failed) {
    el("status").style.display = "block";
    el("status").textContent = `初期表示の一部に失敗: ${failed.reason}`;
  }
}
init();
